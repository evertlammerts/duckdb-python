name: Packaging
on:
  workflow_dispatch:
    inputs:
      git_ref:
        type: string
        description: Git ref of the DuckDB python package
      duckdb_git_ref:
        type: string
        description: Git ref of DuckDB

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_main_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.sdist_summary.outputs.summary }}
    steps:

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0
          submodules: true

      - name: Checkout DuckDB
        shell: bash
        run: |
          cd external/duckdb
          git fetch origin
          git checkout ${{ inputs.duckdb_git_ref }}

      - uses: astral-sh/setup-uv@v1
        with:
          version: "0.7.14"

      - name: Build sdist
        run: uv build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist-main
          path: dist/*.tar.gz

      - name: Save summary
        id: sdist_summary
        run: |
          cd dist
          echo "summary=$(du -h -- *.tar.gz)" >> $GITHUB_OUTPUT

  build_main_wheels:
    name: 'Wheel: ${{ matrix.platform.os }}-${{ matrix.platform.arch }}-${{ matrix.python }}'
    strategy:
      matrix:
        python: [ cp39, cp310, cp311, cp312, cp313 ]
        platform:
          - { os: windows-latest,   arch: amd64 }
          - { os: ubuntu-latest,    arch: x86_64 }
          - { os: ubuntu-latest,    arch: aarch64 }
          - { os: macos-15,         arch: arm64 }
          - { os: macos-15,         arch: universal2 }
          - { os: macos-13,         arch: x86_64 }
    runs-on: ${{ matrix.platform.os }}

    steps:
      # Install Astral UV, which will be used as build-frontend for cibuildwheel
      - uses: astral-sh/setup-uv@v1
        with: { version: "0.7.14" }

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0
          submodules: true

      - name: Checkout DuckDB
        shell: bash
        run: |
          cd external/duckdb
          git fetch origin
          git checkout ${{ inputs.duckdb_git_ref }}

      - name: Set up QEMU only for (non-native) aarch64
        if: runner.os == 'Linux' && matrix.platform.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.0
        env:
          CIBW_ARCHS: ${{ matrix.platform.arch == 'amd64' && 'AMD64' || matrix.platform.arch }}
          CIBW_BUILD: ${{ matrix.python }}-${{
              matrix.platform.os == 'ubuntu-latest'  && 'manylinux' ||
              matrix.platform.os == 'windows-latest' && 'win' ||
                                                        'macosx'
            }}_${{ matrix.platform.arch }}
          CIBW_TEST_SKIP: "*"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.python }}-${{ matrix.platform.os }}-${{ matrix.platform.arch }}
          path: wheelhouse/*.whl

      - name: Create summary
        run: |
          cd wheelhouse
          du -h -- *.whl > wheels.txt

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: metadata-${{ matrix.python }}-${{ matrix.platform.os }}-${{ matrix.platform.arch }}
          path: wheelhouse/wheels.txt

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build_main_sdist, build_main_wheels]
    if: always()
    steps:
      - name: Download wheel summaries
        uses: actions/download-artifact@v4
        with:
          pattern: metadata-*
          path: metadata
          merge-multiple: true

      - name: Summarize all
        shell: bash
        run: |
          to_table_row=( awk '{ print "|", $1, "|", $2, "|" }' )
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Filesize | Filename |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.build_main_sdist.outputs.summary }}" | $to_table_row >> $GITHUB_STEP_SUMMARY 
          for f in metadata/metadata-*; do
            cat $f | $to_table_row >> $GITHUB_STEP_SUMMARY
          done
