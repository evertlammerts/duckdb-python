[project]
name = "duckdb"
version = "v0.0.1a1"
description = "DuckDB in-process database"
readme = "README.md"
keywords = ["DuckDB", "Database", "SQL", "OLAP"]
requires-python = ">=3.9.0"
classifiers = [
    "Topic :: Database :: Database Engines/Servers",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License"
]
authors = [
    {name = "Hannes Muehleisen", email = "hannes@cwi.nl"}
]
maintainers = [
    {name = "DuckDB Labs", email = "info@duckdblabs.nl"}
]

[project.urls]
Documentation = "https://duckdb.org/docs/stable/clients/python/overview"
Source = "https://github.com/duckdb/duckdb/blob/main/tools/pythonpkg"
Issues = "https://github.com/duckdb/duckdb/issues"
Changelog = "https://github.com/duckdb/duckdb/releases"

[project.optional-dependencies]
all = [ # users can install duckdb with 'duckdb[all]', which will install this list
    "ipython", # used in duckdb.query_graph
    "fsspec",  # used in duckdb.filesystem
    "numpy",   # used in duckdb.experimental.spark and in duckdb.fetchnumpy()
    "pandas",  # used for pandas dataframes all over the place
    "pyarrow", # used for pyarrow support
    "adbc_driver_manager", # for the adbc driver (TODO: this should live under the duckdb package)
]

[dependency-groups] # used for development only, requires pip >=25.1.0
stubdeps = [ # dependencies used for typehints in the stubs
    "fsspec",
    "pandas",
    "polars",
    "pyarrow",
]
tests = [ # dependencies used for running tests
    "fsspec>=2022.11.0",
    "gcsfs",
    "mypy",
    "numpy",
    "packaging",
    "pandas>=2.0.0",
    "polars",
    "psutil",
    "py4j",
    "pyarrow>=18.0.0",
    "pyspark",
    "pytest",
    "pytest-reraise",
    "pytest-timeout",
    "pytz",
    "requests",
    "tensorflow; python_version <= '3.12'",
    "torch",
]
scripts = [ # dependencies used for running scripts
    "cxxheaderparser",
    "ipython",
    "ipywidgets",
    "numpy",
    "pandas",
    "pcpp",
    "polars",
    "pyarrow",
    "pytz"
]
sqllogic = [ # dependencies used for running sqllogic
    "pytest",
]
duckdb_pytooling = [ # dependencies used for using included tooling
    "scikit_build_core"
]
dev = [ # tooling like uv will install this automatically when syncing the environment
    "pybind11[global]>=2.6.0",
    {include-group = "stubdeps"},
    {include-group = "tests"},
    {include-group = "scripts"},
    {include-group = "sqllogic"},
    {include-group = "duckdb_pytooling"},
]
build = ["pipx"]

[build-system]
build-backend = "duckdb_pytooling.build_backend"
backend-path = ["./"]
requires = [
    "scikit-build-core",
	"pybind11>=2.6.0",
    "tomli; python_version <= '3.10'"
]

[tool.duckdb]
extensions = ["json", "parquet", "icu"] # default list

[tool.duckdb.sdist]
duckdb_src_target = "extracted/duckdb_src"

[tool.scikit-build.wheel.packages]
duckdb = "duckdb"

[tool.scikit-build]
minimum-version = "0.10"
cmake.version = ">=3.29.0"
ninja.version = ">=1.10"
ninja.make-fallback = false
sdist.cmake = false
sdist.include = [
    "./pyproject.toml",
    "./CMakeLists.txt",
    "./LICENSE",
    "./src/**",
    "./duckdb/**",
    "./duckdb_pytooling/**",
    "./cmake/**",
    "./adbc_driver_duckdb/**",
    "./README.md",
]
sdist.exclude = [
    # --- Directories -----------------------------------------------------------
    ".github/**",
    "external/**",
    "scripts/**",
    "sqllogic/**",
    "tests/**",
    "tools/**",

    # --- Files -----------------------------------------------------------------
    ".clang-format",
    ".clang-tidy",
    ".clangd",
    ".codecov.yml",
    ".editorconfig",
    "*.gitignore",
    "*.gitmodules",
    "CONTRIBUTING.md",
    "pyodide.md",
]

[tool.scikit-build.cmake.define]
BUILD_UNITTESTS = "0" # do not build tests
BUILD_SHELL = "0" # do not include anything in external/duckdb/tools
