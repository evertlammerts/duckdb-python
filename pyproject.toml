[project]
name = "duckdb"
version = "v0.0.1a1"
description = "DuckDB in-process database"
readme = "README.md"
keywords = ["DuckDB", "Database", "SQL", "OLAP"]
requires-python = ">=3.9.0"
classifiers = [
    "Topic :: Database :: Database Engines/Servers",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License"
]
authors = [
    {name = "Hannes Muehleisen", email = "hannes@cwi.nl"}
]
maintainers = [
    {name = "DuckDB Labs", email = "info@duckdblabs.nl"}
]

[project.urls]
Documentation = "https://duckdb.org/docs/stable/clients/python/overview"
Source = "https://github.com/duckdb/duckdb/blob/main/tools/pythonpkg"
Issues = "https://github.com/duckdb/duckdb/issues"
Changelog = "https://github.com/duckdb/duckdb/releases"

[project.optional-dependencies]
dev = [
    "scikit-build-core",
    "pybind11[global]>=2.6.0",
    "numpy>=1.14",
    "pytest",
    "pytest-reraise",
    "pytest-timeout",
    "pandas",
    "mypy<=1.13"
]

[build-system]
build-backend = "scikit_build_core.build"
requires = [
    "scikit-build-core",
	"pybind11>=2.6.0",
]

[tool.scikit-build]
minimum-version = "0.10"
cmake.version = ">=3.29.0"
ninja.version = ">=1.10"
ninja.make-fallback = false
sdist.cmake = false
sdist.include = [
    # --- Python package itself -------------------------------------------------
    "./pyproject.toml",
    "./CMakeLists.txt",
    "./LICENSE",
    "./src/**",
    "./duckdb/**",
    "./cmake/**",
    "./adbc_driver_duckdb/**",

    # --- DuckDB core -----------------------------------------------------------
    "./external/duckdb/CMakeLists.txt",
    "./external/duckdb/src/**",
    "./external/duckdb/third_party/**",
    "./external/duckdb/extension/**",
    "./external/duckdb/src/include/**",
    "./external/duckdb/tools/CMakeLists.txt",
    "./external/duckdb/LICENSE",
]
sdist.exclude = [
    # --- VCS, build artefacts, etc ---------------------------------------------
    "**/*.git*",
    "**/.gitignore",
    "**/.gitmodules",
    "**/.gitattributes",
    "**/CMakeFiles/**",
    "**/build/**",
    "**/dist/**",
    "**/__pycache__/**",
    "**/*.pyc",
    "**/*.pyo",
    "**/*.egg-info/**",
    "**/.DS_Store",
    "**/Thumbs.db",

    # --- Development environment and IDE files --------------------------------
    "**/.github/**",
    "**/.idea/**",
    "**/.vscode/**",
    "**/.pytest_cache/**",
    "**/.mypy_cache/**",
    "**/.ruff_cache/**",
    "**/.clang-format",
    "**/.clang-tidy",
    "**/.codecov.yml",
    "**/.coverage*",
    "**/coverage.xml",
    "**/MakeFile",
    "**/Doxyfile",

    # --- Test files and directories --------------------------------------------
    "**/test/**",
    "**/tests/**",
    "**/sqllogic/**",

    # --- Development configuration and dependencies ---------------------------
    "**/requirements*.txt",
    "**/uv.lock",
    "**/mypy.ini",
    "**/tox.ini",
    "**/.env*",

    # --- Development scripts and tools ----------------------------------------
    "**/scripts/**",
    "**/tools/**",

    # --- Documentation development files --------------------------------------
    "**/CONTRIBUTING.md",
    "**/pyodide.md",

    # --- Log and temporary files -----------------------------------------------
    "**/*.log",
    "**/tmp/**",
    "**/temp/**",

    # --- DuckDB core -----------------------------------------------------------
    "external/**/*.md",
    "external/duckdb/benchmark/**",
    "external/duckdb/data/**",
    "external/duckdb/examples/**",
    "external/duckdb/logo/**",
    "external/duckdb/scripts/**",
    "external/duckdb/tools/**/!(CMakeLists.txt)",

    # --- Third-party vendor stuff ----------------------------------------------
    "external/duckdb/third_party/**/test*/**",
    "external/duckdb/third_party/**/benchmark*/**",
    "external/duckdb/third_party/**/example*/**",
    "external/duckdb/third_party/**/doc*/**",
]

#cmake.args = ["-DCMAKE_OSX_ARCHITECTURES=arm64"]

[tool.scikit-build.wheel.packages]
duckdb = "duckdb"

[tool.uv.workspace]
members = ["dist"]

[tool.scikit-build.cmake.define]
BUILD_EXTENSIONS = ["json", "parquet", "icu"] # default list
BUILD_UNITTESTS = "0" # do not build tests
BUILD_SHELL = "0" # do not include anything in external/duckdb/tools
