[project]
name = "duckdb"
dynamic = ["version"]
description = "DuckDB in-process database"
readme = "README.md"
keywords = ["DuckDB", "Database", "SQL", "OLAP"]
requires-python = ">=3.9.0"
classifiers = [
    "Topic :: Database :: Database Engines/Servers",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License"
]
authors = [
    {name = "DuckDB Labs", email = "info@duckdblabs.nl"}
]
maintainers = [
    {name = "DuckDB Labs", email = "info@duckdblabs.nl"}
]

[project.urls]
Documentation = "https://duckdb.org/docs/stable/clients/python/overview"
Source = "https://github.com/duckdb/duckdb/blob/main/tools/pythonpkg"
Issues = "https://github.com/duckdb/duckdb/issues"
Changelog = "https://github.com/duckdb/duckdb/releases"

[project.optional-dependencies]
all = [ # users can install duckdb with 'duckdb[all]', which will install this list
    "ipython", # used in duckdb.query_graph
    "fsspec",  # used in duckdb.filesystem
    "numpy",   # used in duckdb.experimental.spark and in duckdb.fetchnumpy()
    "pandas",  # used for pandas dataframes all over the place
    "pyarrow", # used for pyarrow support
    "adbc_driver_manager", # for the adbc driver (TODO: this should live under the duckdb package)
]

[dependency-groups] # used for development only, requires pip >=25.1.0
stubdeps = [ # dependencies used for typehints in the stubs
    "fsspec",
    "pandas",
    "polars",
    "pyarrow",
]
test = [ # dependencies used for running tests
    "fsspec>=2022.11.0",
    "gcsfs",
    "mypy",
    "numpy",
    "packaging",
    "pandas>=2.0.0",
    "polars",
    "psutil",
    "py4j",
    "pyarrow>=18.0.0",
    "pyspark",
    "pytest",
    "pytest-reraise",
    "pytest-timeout",
    "pytz",
    "requests",
    "tensorflow; python_version <= '3.12'",
    "torch",
]
scripts = [ # dependencies used for running scripts
    "cxxheaderparser",
    "ipython",
    "ipywidgets",
    "numpy",
    "pandas",
    "pcpp",
    "polars",
    "pyarrow",
    "pytz"
]
sqllogic = [ # dependencies used for running sqllogic
    "pytest",
]
duckdb_packaging = [ # dependencies used for using included packaging tooling
    "scikit_build_core",
    "setuptools_scm>=8.0"
]
build = ["pipx"]
dev = [ # tooling like uv will install this automatically when syncing the environment
    "pybind11[global]>=2.6.0",
    "ruff>=0.11.13",
    {include-group = "stubdeps"},
    {include-group = "test"},
    {include-group = "scripts"},
    {include-group = "sqllogic"},
    {include-group = "duckdb_packaging"},
    {include-group = "build"},
]

[build-system]
build-backend = "duckdb_packaging"
backend-path = ["./"]
requires = [
    "scikit-build-core",
	"pybind11>=2.6.0",
    "setuptools_scm>=8.0",
]

[tool.duckdb]
extensions = [
    "core_functions",
    "json",
    "parquet",
    "icu",
    "jemalloc" # will only be activated
]
sdist.duckdb_src_target = "extracted/duckdb_src"

[tool.scikit-build.wheel.packages]
duckdb = "duckdb"

[tool.scikit-build]
minimum-version = "0.10"
cmake.version = ">=3.29.0"
ninja.version = ">=1.10"
ninja.make-fallback = false
metadata.version.provider = "scikit_build_core.metadata.setuptools_scm"

[tool.scikit-build.cmake.define]
CORE_EXTENSIONS = "core_functions;json;parquet;icu;jemalloc"

[tool.setuptools_scm]
version_scheme = "duckdb_packaging.setuptools_scm_version:version_scheme"
local_scheme = "no-local-version"
fallback_version = "0.0.1.dev1"

[tool.scikit-build.sdist]
include = [
    "./pyproject.toml",
    "./CMakeLists.txt",
    "./LICENSE",
    "./src/**",
    "./duckdb/**",
    "./duckdb_packaging/**",
    "./cmake/**",
    "./adbc_driver_duckdb/**",
    "./README.md",

    # --------------- DuckDB submodule includes
    # Core DuckDB source and build system
    "external/duckdb/LICENSE",
    "external/duckdb/src/**",
    "external/duckdb/CMakeLists.txt",
    "external/duckdb/DuckDBConfig.cmake.in",
    "external/duckdb/DuckDBConfigVersion.cmake.in",

    # Third-party libraries and extensions
    "external/duckdb/third_party/**",
    "external/duckdb/extension/**",
]
exclude = [
    # Remove CI, git, scripts, tests and tools
    ".github/**",
    ".git/**",
    "scripts/**",
    "sqllogic/**",
    "tests/**",
    "tools/**",

    # Remove config and markdown files
    ".clang-format",
    ".clang-tidy",
    ".clangd",
    ".codecov.yml",
    ".editorconfig",
    "*.gitignore",
    "*.gitmodules",
    "CONTRIBUTING.md",
    "pyodide.md",

    # --------------- DuckDB submodule excludes
    # Remove tests, benchmarks, tools
    "external/duckdb/test/**",
    "external/duckdb/benchmark/**",
    "external/duckdb/tools/**",
    "external/duckdb/examples/**",
    "external/duckdb/data/**",

    # Remove documentation
    "external/duckdb/README.md",
    "external/duckdb/CONTRIBUTING.md",
    "external/duckdb/CODE_OF_CONDUCT.md",
    "external/duckdb/CITATION.cff",
    "external/duckdb/Doxyfile",
    "external/duckdb/Makefile",
    "external/duckdb/logo/**",
    "external/duckdb/extension/**/*.md",

    # Remove non-essential extensions
    "external/duckdb/extension/tpch/**",
    "external/duckdb/extension/tpcds/**",
    "external/duckdb/extension/demo_capi/**",

    # Remove VCS and build artifacts
    "external/duckdb/.git/**",
    "external/duckdb/.github/**",
    "external/duckdb/.gitignore",
    "external/duckdb/.gitmodules",
    "external/duckdb/build/**",

    # Remove large data files
    "external/duckdb/**/*.gz",
    "external/duckdb/**/*.zip",
    "external/duckdb/**/*.tar",
    "external/duckdb/**/*.parquet",
    "external/duckdb/**/*.csv",
    "external/duckdb/**/*.json",
    "external/duckdb/**/*.ndjson",
    "external/duckdb/**/*.jsonl",
    "external/duckdb/**/*.db",
    "external/duckdb/**/*.wal",

    # Remove generated/temporary files
    "external/duckdb/**/*.pyc",
    "external/duckdb/**/__pycache__/**",
    "external/duckdb/**/.DS_Store",
    "external/duckdb/**/*~",
    "external/duckdb/**/*.swp",
    "external/duckdb/**/*.o",
    "external/duckdb/**/*.so",
    "external/duckdb/**/*.dylib",
    "external/duckdb/**/*.dll",
    "external/duckdb/**/*.exe",
    "external/duckdb/**/*.a",
    "external/duckdb/**/*.lib",

    # Remove IDE files
    "external/duckdb/**/.vscode/**",
    "external/duckdb/**/.idea/**",
    "external/duckdb/**/*.vcxproj",
    "external/duckdb/**/*.sln",
    "external/duckdb/**/*.xcodeproj",

    # Remove specific large generated files (only if they exist)
    "external/duckdb/src/parser/grammar.cpp",
    "external/duckdb/src/parser/grammar.hpp",
    "external/duckdb/src/amalgamation/**",
]